<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparada para a Surpresa? - Buquê de Flores</title>
    <link rel="stylesheet" href="css/surprise-buttons.css">
</head>
<body class="surprise-container">
    <div class="background-animation"></div>
    
    <a href="index.html" class="surprise-link" title="Voltar para o início">
        <div class="surprise-button-icon">🌹</div>
    </a>
    
    <div class="content-wrapper">
        <h1 class="question-text">Está Preparada para a sua surpresa?</h1>
        
        <div class="buttons-container">
            <button class="btn btn-sim" id="btnSim">
                <span class="btn-text">Sim</span>
                <span class="btn-emoji">💝</span>
            </button>
            
            <button class="btn btn-nao" id="btnNao">
                <span class="btn-text">Não</span>
                <span class="btn-emoji">😊</span>
            </button>
        </div>
        
        <div class="response-message" id="responseMessage"></div>
    </div>

    <script src="js/surprise-buttons.js"></script>
</body>
</html>
